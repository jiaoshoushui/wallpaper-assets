name: Sync wallpapers

on:
  push:
    branches: [main]
    paths:
      - 'pc/**'
      - 'phone/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Commit manifest & thumbs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json thumb pc phone
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync wallpaper manifest"
            git push
          fi
