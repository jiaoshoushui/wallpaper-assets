name: Validate wallpapers

on:
  push:
    branches: [main]
    paths:
      - 'pc/**'
      - 'phone/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
